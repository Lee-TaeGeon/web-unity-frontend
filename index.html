<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Space Y</title>
  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <link rel="stylesheet" href="TemplateData/style.css">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #222;
    }

    .topbar {
      height: 60px;
      background: #1f2937;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      box-sizing: border-box;
    }

    .topbar .brand {
      font-weight: bold;
      font-size: 20px;
    }

    .topbar .menu a {
      color: white;
      text-decoration: none;
      margin-left: 18px;
      font-size: 14px;
    }

    .layout {
      display: flex;
      min-height: calc(100vh - 60px);
    }

    .sidebar {
      width: 240px;
      background: #111827;
      color: white;
      padding: 24px 18px;
      box-sizing: border-box;
    }

    .sidebar h3 {
      margin-top: 0;
      font-size: 18px;
      margin-bottom: 18px;
    }

    .sidebar a {
      display: block;
      color: #d1d5db;
      text-decoration: none;
      margin-bottom: 14px;
      font-size: 14px;
      padding: 8px 10px;
      border-radius: 8px;
    }

    .sidebar a:hover {
      background: #1f2937;
      color: white;
    }

    .sidebar .section {
      margin-top: 28px;
    }

    .sidebar .small {
      font-size: 13px;
      color: #9ca3af;
      line-height: 1.6;
    }

    .content {
      flex: 1;
      padding: 24px;
      box-sizing: border-box;
    }

    .hero {
      margin-bottom: 20px;
    }

    .hero h1 {
      margin: 0 0 8px 0;
      font-size: 28px;
    }

    .hero p {
      margin: 0;
      color: #555;
    }

    .unity-wrapper {
      background: white;
      border-radius: 16px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
      padding: 20px;
      box-sizing: border-box;
    }

    #unity-logo {
  display: none;
}

    #unity-container {
      margin: 0 auto;
      text-align: center;
    }

    #unity-warning {
      margin-top: 12px;
    }

    @media (max-width: 900px) {
      .layout {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
      }

      .content {
        padding: 16px;
      }

      #unity-canvas {
        width: 100% !important;
        height: auto !important;
      }
    }
  </style>
</head>

<body>
  <div class="topbar">
    <div class="brand">🚀 Space Y</div>
    <div class="menu">
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="https://github.com/Lee-TaeGeon" target="_blank">GitHub</a>
    </div>
  </div>

  <div class="layout">
    <aside class="sidebar">
      <h3>Menu</h3>
      <a href="#">Overview</a>
      <a href="#">Simulation</a>
      <a href="#">Tech Stack</a>
      <a href="#">API Connection</a>
      <a href="https://github.com/Lee-TaeGeon" target="_blank">Repository</a>

      <div class="section">
        <h3>Info</h3>
        <div class="small">
          Unity WebGL + FastAPI 기반의<br>
          실시간 방향 추적 테스트 페이지
        </div>
      </div>

      <div class="section">
        <h3>Status</h3>
        <div class="small">
          - Jupiter auto move<br>
          - Rocket tracking<br>
          - Web demo ready
        </div>
      </div>
    </aside>

    <main class="content">
      <div class="hero">
        <h1>Jupiter Tracking Simulation</h1>
        <p>Unity WebGL과 FastAPI를 이용한 실시간 방향 추적 데모</p>
      </div>

      <div class="unity-wrapper">
        <div id="unity-container" class="unity-desktop">
          <canvas id="unity-canvas" width="960" height="600" tabindex="-1"></canvas>

          <div id="unity-loading-bar">
            <div id="unity-logo"></div>
            <div id="unity-progress-bar-empty">
              <div id="unity-progress-bar-full"></div>
            </div>
          </div>

          <div id="unity-warning"></div>

          <div id="unity-footer">
            <!-- <div id="unity-logo-title-footer"></div> -->
            <div id="unity-fullscreen-button"></div>
            <div id="unity-build-title">Europa Demo</div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    var canvas = document.querySelector("#unity-canvas");

    function unityShowBanner(msg, type) {
      var warningBanner = document.querySelector("#unity-warning");
      function updateBannerVisibility() {
        warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
      }
      var div = document.createElement('div');
      div.innerHTML = msg;
      warningBanner.appendChild(div);
      if (type == 'error') div.style = 'background: red; color: white; padding: 10px; border-radius: 8px;';
      else {
        if (type == 'warning') div.style = 'background: yellow; padding: 10px; border-radius: 8px;';
        setTimeout(function() {
          warningBanner.removeChild(div);
          updateBannerVisibility();
        }, 5000);
      }
      updateBannerVisibility();
    }

    var buildUrl = "Build";
    var loaderUrl = buildUrl + "/WebGLBuild.loader.js";

    var config = {
      dataUrl: buildUrl + "/WebGLBuild.data",
      frameworkUrl: buildUrl + "/WebGLBuild.framework.js",
      codeUrl: buildUrl + "/WebGLBuild.wasm",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "DefaultCompany",
      productName: "Europa Demo",
      productVersion: "1.0",
      showBanner: unityShowBanner,
    };

    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      var meta = document.createElement('meta');
      meta.name = 'viewport';
      meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no';
      document.head.appendChild(meta);

      document.querySelector("#unity-container").className = "unity-mobile";
      canvas.className = "unity-mobile";
    } else {
      canvas.style.width = "960px";
      canvas.style.height = "600px";
    }

    document.querySelector("#unity-loading-bar").style.display = "block";

    var script = document.createElement("script");
    script.src = loaderUrl;

    script.onload = () => {
      createUnityInstance(canvas, config, (progress) => {
        document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
      }).then((unityInstance) => {
        document.querySelector("#unity-loading-bar").style.display = "none";
        document.querySelector("#unity-fullscreen-button").onclick = () => {
          unityInstance.SetFullscreen(1);
        };
      }).catch((message) => {
        alert(message);
      });
    };

    document.body.appendChild(script);
  </script>
</body>
</html>
